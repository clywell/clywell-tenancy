name: Release & Package

on:
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: 'Release'
  PROJECT_NAME: 'Clywell.Core.Tenancy'
  PROJECT_FILE: 'src/Clywell.Core.Tenancy/Clywell.Core.Tenancy.csproj'

jobs:
  # ============================================================
  # Validate and Build
  # ============================================================
  validate-build:
    runs-on: ubuntu-latest
    name: Validate & Build Release
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract Version from version.json
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "❌ Failed to extract version from version.json"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ Version extracted from version.json: ${VERSION}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run tests
        run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --logger "console;verbosity=minimal"

  # ============================================================
  # Package
  # ============================================================
  package:
    runs-on: ubuntu-latest
    name: Create NuGet Package
    needs: validate-build
    outputs:
      package_path: ${{ steps.package.outputs.path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Create NuGet package
        id: package
        run: |
          dotnet pack \
            -c ${{ env.BUILD_CONFIGURATION }} \
            --no-restore \
            -p:Version=${{ needs.validate-build.outputs.version }} \
            -p:PackageVersion=${{ needs.validate-build.outputs.version }} \
            -o ./artifacts \
            ${{ env.PROJECT_FILE }}

          PACKAGE_FILE=$(find ./artifacts -name "*.nupkg" | head -1)
          echo "path=$(realpath "$PACKAGE_FILE")" >> $GITHUB_OUTPUT
          echo "✓ Package created: $PACKAGE_FILE"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: ${{ steps.package.outputs.path }}
          retention-days: 30

  # ============================================================
  # Publish to NuGet
  # ============================================================
  publish-nuget:
    runs-on: ubuntu-latest
    name: Publish to NuGet
    needs: [validate-build, package]
    environment: production

    steps:
      - name: Download package
        uses: actions/download-artifact@v8
        with:
          name: nuget-package

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push \
            *.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}

  # ============================================================
  # Create GitHub Release
  # ============================================================
  github-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: [validate-build, publish-nuget]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download package
        uses: actions/download-artifact@v8
        with:
          name: nuget-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-build.outputs.version }}
          name: Release v${{ needs.validate-build.outputs.version }}
          body: |
            ## Clywell.Core.Tenancy v${{ needs.validate-build.outputs.version }}

            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: '*.nupkg'
          draft: false
          prerelease: false
